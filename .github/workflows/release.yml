name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Build all platforms
        run: |
          VERSION=${GITHUB_REF_NAME}
          LDFLAGS="-s -w -X main.version=${VERSION}"
          mkdir -p dist

          GOOS=windows GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/mail-shadow-mcp-windows-amd64.exe ./cmd/mail-shadow-mcp
          GOOS=windows GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o dist/mail-shadow-mcp-windows-arm64.exe ./cmd/mail-shadow-mcp
          GOOS=linux   GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/mail-shadow-mcp-linux-amd64      ./cmd/mail-shadow-mcp
          GOOS=linux   GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o dist/mail-shadow-mcp-linux-arm64      ./cmd/mail-shadow-mcp
          GOOS=darwin  GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/mail-shadow-mcp-darwin-amd64     ./cmd/mail-shadow-mcp
          GOOS=darwin  GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o dist/mail-shadow-mcp-darwin-arm64     ./cmd/mail-shadow-mcp

          # Bundle config.example.yaml alongside each binary
          cd dist
          cp ../config.example.yaml .

          # Create compressed archives
          for f in mail-shadow-mcp-linux-* mail-shadow-mcp-darwin-*; do
            tar czf "${f}.tar.gz" "${f}" config.example.yaml && rm "${f}"
          done
          for f in mail-shadow-mcp-windows-*.exe; do
            zip "${f%.exe}.zip" "${f}" config.example.yaml && rm "${f}"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
